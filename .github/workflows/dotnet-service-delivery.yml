name: Fcs.Identity Delivery To K3s

on:
  workflow_run:
    workflows: ["Fcs.Identity CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: group10-tc-01/fcs-pipelines/.github/workflows/k3s-service-delivery.yml@main
    with:
      service_name: fcs-identity
      image_repository: ghcr.io/group10-tc-01/fcs-identity
      source_ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
      k8s_namespace: fcs-identity
      k8s_deployment_name: fcs-identity
      k8s_container_name: api
      k8s_manifest_path: k8s/deployment.yaml
      environment: production
    secrets: inherit
